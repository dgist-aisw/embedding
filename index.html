<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Model Semantic Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c; --surface: #131318; --border: #1e1e26;
    --text: #e8e6f0; --text-dim: #6b6880; --accent: #7c6aef;
    --accent-glow: rgba(124, 106, 239, 0.15); --green: #50d080;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 2rem;
  }
  .container { max-width: 800px; width: 100%; }
  header { text-align: center; margin-bottom: 2rem; }
  h1 { font-family: 'Instrument Serif', serif; font-size: 2.5rem; font-weight: 400; }
  h1 em { color: var(--accent); font-style: italic; }
  
  .input-group { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; }
  .input-row { display: flex; align-items: center; gap: 1rem; }
  input[type="text"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.8rem; color: var(--text); font-family: inherit;
  }
  .btn {
    width: 100%; padding: 1rem; background: var(--accent); color: white;
    border: none; border-radius: 8px; cursor: pointer; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2rem;
  }
  .btn:disabled { opacity: 0.4; }

  /* Grid for results */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 1rem;
    width: 100%;
  }
  .model-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem; position: relative;
  }
  .model-name { font-size: 0.7rem; color: var(--accent); font-weight: 600; margin-bottom: 0.5rem; }
  .model-info { font-size: 0.6rem; color: var(--text-dim); margin-bottom: 1rem; }
  .score-row { display: flex; align-items: flex-end; gap: 1rem; }
  .score-value { font-family: 'Instrument Serif', serif; font-size: 2.5rem; line-height: 1; }
  .bar-container { flex: 1; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 0.5rem; overflow: hidden; }
  .bar-fill { height: 100%; width: 0%; background: var(--accent); transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
  
  .status-overlay {
    position: fixed; bottom: 2rem; right: 2rem; padding: 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.7rem; z-index: 100;
  }
  .chip { padding: 0.4rem 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text-dim); cursor: pointer; font-size: 0.7rem; margin: 0.2rem; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Multi-Model <em>Comparison</em></h1>
    <p style="color:var(--text-dim); font-size: 0.8rem; margin-top: 0.5rem;">여러 임베딩 모델의 성능을 실시간으로 비교해봐</p>
  </header>

  <div class="input-group">
    <div class="input-row">
      <input type="text" id="inputA" placeholder="Sentence A..." value="고양이가 낮잠을 잔다">
    </div>
    <div class="input-row">
      <input type="text" id="inputB" placeholder="Sentence B..." value="작은 동물이 잠을 자고 있다">
    </div>
  </div>

  <button class="btn" id="compareBtn" disabled>모델 로딩 중...</button>

  <div class="results-grid" id="resultsGrid"></div>

  <div style="margin-top: 2rem; text-align: center;">
    <p style="font-size: 0.6rem; color: var(--text-dim); margin-bottom: 1rem;">Example Pairs</p>
    <div id="exampleChips"></div>
  </div>
</div>

<div class="status-overlay" id="statusOverlay">모델 초기화 중...</div>

<script type="module">
  import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

  // 추천하는 경량 모델 리스트 (30MB 내외)
  const MODELS = [
    { id: 'Xenova/all-MiniLM-L6-v2', name: 'All-MiniLM-L6-v2', size: '23MB', desc: '가장 표준적인 경량 모델' },
    { id: 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', name: 'Multi-MiniLM-L12', size: '25MB', desc: '한국어 포함 다국어 특화' },
    { id: 'Xenova/bge-small-en-v1.5', name: 'BGE-Small-v1.5', size: '28MB', desc: '현재 SOTA급 검색 성능' },
    { id: 'Xenova/gte-small', name: 'GTE-Small', size: '25MB', desc: 'Alibaba 개발, 안정적인 성능' }
  ];

  const examples = [
    ['오늘 날씨 정말 좋다', 'It is a beautiful day today'],
    ['딥러닝 논문 작성법', 'How to write a research paper'],
    ['자율주행 로봇 제어', '냉장고 필터 교체'],
    ['이 과제는 반드시 합격한다', '연구 제안서가 승인될 것이다']
  ];

  const resultsGrid = document.getElementById('resultsGrid');
  const statusOverlay = document.getElementById('statusOverlay');
  const compareBtn = document.getElementById('compareBtn');
  const exampleChips = document.getElementById('exampleChips');

  let pipelines = {};

  // 초기 카드 생성
  MODELS.forEach(m => {
    const card = document.createElement('div');
    card.className = 'model-card';
    card.innerHTML = `
      <div class="model-name">${m.name}</div>
      <div class="model-info">${m.size} • ${m.desc}</div>
      <div class="score-row">
        <div class="score-value" id="score-${m.id.replace(/\//g, '-')}" style="color:var(--text-dim)">--</div>
        <div class="bar-container">
          <div class="bar-fill" id="bar-${m.id.replace(/\//g, '-')}"></div>
        </div>
      </div>
    `;
    resultsGrid.appendChild(card);
  });

  // 모델 로드
  async function init() {
    for (const m of MODELS) {
      statusOverlay.textContent = `${m.name} 불러오는 중...`;
      pipelines[m.id] = await pipeline('feature-extraction', m.id);
    }
    statusOverlay.style.display = 'none';
    compareBtn.disabled = false;
    compareBtn.textContent = '모든 모델 비교 실행';
  }

  function cosineSimilarity(a, b) {
    let dot = 0, nA = 0, nB = 0;
    for (let i = 0; i < a.length; i++) {
      dot += a[i] * b[i]; nA += a[i] * a[i]; nB += b[i] * b[i];
    }
    return dot / (Math.sqrt(nA) * Math.sqrt(nB));
  }

  async function runAll() {
    const textA = document.getElementById('inputA').value;
    const textB = document.getElementById('inputB').value;
    compareBtn.disabled = true;

    for (const m of MODELS) {
      const p = pipelines[m.id];
      const [outA, outB] = await Promise.all([
        p(textA, { pooling: 'mean', normalize: true }),
        p(textB, { pooling: 'mean', normalize: true })
      ]);
      
      const sim = cosineSimilarity(outA.data, outB.data);
      const scoreEl = document.getElementById(`score-${m.id.replace(/\//g, '-')}`);
      const barEl = document.getElementById(`bar-${m.id.replace(/\//g, '-')}`);
      
      scoreEl.textContent = sim.toFixed(3);
      scoreEl.style.color = sim > 0.7 ? 'var(--green)' : 'var(--text)';
      barEl.style.width = `${Math.max(0, sim * 100)}%`;
      if(sim > 0.7) barEl.style.background = 'var(--green)';
      else barEl.style.background = 'var(--accent)';
    }
    compareBtn.disabled = false;
  }

  // 예시 칩 생성
  examples.forEach(([a, b]) => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = `${a} ↔ ...`;
    chip.onclick = () => {
      document.getElementById('inputA').value = a;
      document.getElementById('inputB').value = b;
      runAll();
    };
    exampleChips.appendChild(chip);
  });

  compareBtn.onclick = runAll;
  init();
</script>
</body>
</html>
